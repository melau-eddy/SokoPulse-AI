version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: sokopulse_db
    environment:
      POSTGRES_DB: sokopulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sokopulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sokopulse_backend
    command: >
      bash -c "python manage.py migrate &&
               python manage.py seed_db &&
               python manage.py run_pipeline &&
               python manage.py runserver 0.0.0.0:5000"
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=db
      - DB_NAME=sokopulse
      - DB_USER=postgres
      - DB_PASSWORD=postgrespassword
      - DB_PORT=5432
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sokopulse_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
